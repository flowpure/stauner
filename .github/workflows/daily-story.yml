name: Täglicher Stauner

on:
  schedule:
    - cron: '0 3 * * *'  # täglich um 5:00 Uhr deutscher Zeit (UTC+2 Sommerzeit)
  workflow_dispatch:       # auch manuell auslösbar zum Testen

jobs:
  generate-story:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v5

      - name: Geschichte generieren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error
          from datetime import date

          today = date.today().isoformat()
          api_key = os.environ.get('ANTHROPIC_API_KEY', '')

          # Lade bisherige Titel aus sammlung.json
          previous_titles = "keine"
          if os.path.exists('sammlung.json'):
              try:
                  with open('sammlung.json', 'r', encoding='utf-8') as f:
                      sammlung = json.load(f)
                  titles = [e.get('titel', '') for e in sammlung[-60:] if e.get('titel')]
                  if titles:
                      previous_titles = ', '.join(titles)
              except Exception as e:
                  print(f"Sammlung konnte nicht geladen werden: {e}")

          print(f"Bereits behandelte Themen: {previous_titles[:300]}")

          prompt = (
              f"Du bist Chefredakteur von 'Der tägliche Stauner' im Geist von 'Im Grunde Gut' und 'Factfulness'. "
              f"Heute ist der {today}. "
              f"Diese Titel wurden bereits verwendet — waehle ein KOMPLETT anderes Thema: {previous_titles}. "
              f"Waehle ein spezifisches, faszinierendes Thema aus Wissenschaft, Biologie, Astronomie, "
              f"Verhaltensoeokonomie, Neurologie, Geologie, Linguistik, Materialwissenschaft, Epigenetik, "
              f"Meeresbiologie, Quantenphysik, Archaeologie, Spieltheorie, Anthropologie, Oekologie, "
              f"Forstwirtschaft oder Geschichte. "
              f"Die Geschichte beginnt mit einer konkreten verbreiteten Fehlannahme und zeigt dann mit "
              f"praezisen Fakten was wirklich stimmt. Ton: sachlich, praezise, faszinierend. "
              f"Niemals Krieg, Katastrophen, politische Konflikte. "
              f"Fuege einen Bonusfakt unter 'Schon gewusst?' hinzu. "
              f"Quelle: eine echte existierende Studie oder Institution mit echter URL. "
              f"Antworte NUR mit diesem JSON ohne Markdown-Backticks: "
              '{{"kategorie":"...","titel":"...","stauner":"2-3 Saetze","absaetze":["...","...","..."],'
              '"schon_gewusst":"...","quelle":"...","quelle_url":"https://..."}}'
          )

          payload = {
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 1200,
              "messages": [{"role": "user", "content": prompt}]
          }

          req = urllib.request.Request(
              'https://api.anthropic.com/v1/messages',
              data=json.dumps(payload).encode('utf-8'),
              headers={
                  'Content-Type': 'application/json',
                  'x-api-key': api_key,
                  'anthropic-version': '2023-06-01'
              },
              method='POST'
          )

          try:
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode('utf-8'))
          except urllib.error.HTTPError as e:
              print(f"API Fehler: {e.code} {e.read().decode('utf-8')}")
              exit(1)

          text = data['content'][0]['text'].strip()
          if text.startswith('```'):
              text = text.split('\n', 1)[1].rsplit('```', 1)[0].strip()

          story = json.loads(text)
          story['datum'] = today

          # Speichere story.json
          with open('story.json', 'w', encoding='utf-8') as f:
              json.dump(story, f, ensure_ascii=False, indent=2)

          # Fuege zur Sammlung hinzu
          sammlung = []
          if os.path.exists('sammlung.json'):
              try:
                  with open('sammlung.json', 'r', encoding='utf-8') as f:
                      sammlung = json.load(f)
              except:
                  sammlung = []

          sammlung.append(story)

          with open('sammlung.json', 'w', encoding='utf-8') as f:
              json.dump(sammlung, f, ensure_ascii=False, indent=2)

          print(f"Geschichte erfolgreich generiert: {story.get('titel', '')}")
          print(f"Sammlung enthaelt jetzt {len(sammlung)} Geschichten")
          PYEOF

      - name: Dateien committen
        run: |
          git config user.name "Täglicher Stauner"
          git config user.email "stauner@hirnholz.de"
          git add story.json sammlung.json
          git diff --staged --quiet || git commit -m "Stauner: $(date +%Y-%m-%d)"
          git push
