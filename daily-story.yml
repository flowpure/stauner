name: Täglicher Stauner

on:
  schedule:
    - cron: '0 3 * * *'  # täglich um 5:00 Uhr deutscher Zeit (UTC+2 Sommerzeit)
  workflow_dispatch:       # auch manuell auslösbar zum Testen

jobs:
  generate-story:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v5

      - name: Geschichte generieren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error
          from datetime import date
          from collections import Counter

          today = date.today().isoformat()
          api_key = os.environ.get('ANTHROPIC_API_KEY', '')

          # ── KATEGORIE-SYSTEM ────────────────────────────────────────
          # 4 Hauptkategorien, 27 Unterkategorien in deterministischer
          # Rotation. Jede Hauptkategorie erscheint gleichmäßig verteilt.
          # Neurologie: 1x alle 27 Tage. Meeresbiologie: 1x alle 27 Tage.

          ROTATION = [
              "Astronomie",            # Naturwissenschaften
              "Evolutionsbiologie",    # Biologie & Ökologie
              "Neurologie",            # Mensch & Gesellschaft
              "Geschichte",            # Geschichte & Kultur
              "Meeresbiologie",        # Biologie & Ökologie
              "Physik",                # Naturwissenschaften
              "Psychologie",           # Mensch & Gesellschaft
              "Archäologie",           # Geschichte & Kultur
              "Botanik",               # Biologie & Ökologie
              "Mathematik",            # Naturwissenschaften
              "Linguistik",            # Mensch & Gesellschaft
              "Klimaforschung",        # Geschichte & Kultur
              "Mikrobiologie",         # Biologie & Ökologie
              "Quantenphysik",         # Naturwissenschaften
              "Verhaltensökonomie",    # Mensch & Gesellschaft
              "Technologiegeschichte", # Geschichte & Kultur
              "Ozeanographie",         # Biologie & Ökologie
              "Chemie",                # Naturwissenschaften
              "Anthropologie",         # Mensch & Gesellschaft
              "Ökologie",              # Biologie & Ökologie
              "Medizingeschichte",     # Mensch & Gesellschaft
              "Materialwissenschaft",  # Naturwissenschaften
              "Epigenetik",            # Biologie & Ökologie
              "Soziologie",            # Mensch & Gesellschaft
              "Forstwirtschaft",       # Biologie & Ökologie
              "Spieltheorie",          # Mensch & Gesellschaft
              "Geschichte",            # Geschichte & Kultur
          ]

          HAUPTKATEGORIEN = {
              "Astronomie": "Naturwissenschaften",
              "Physik": "Naturwissenschaften",
              "Chemie": "Naturwissenschaften",
              "Quantenphysik": "Naturwissenschaften",
              "Mathematik": "Naturwissenschaften",
              "Materialwissenschaft": "Naturwissenschaften",
              "Evolutionsbiologie": "Biologie & Ökologie",
              "Mikrobiologie": "Biologie & Ökologie",
              "Botanik": "Biologie & Ökologie",
              "Epigenetik": "Biologie & Ökologie",
              "Ökologie": "Biologie & Ökologie",
              "Forstwirtschaft": "Biologie & Ökologie",
              "Meeresbiologie": "Biologie & Ökologie",
              "Ozeanographie": "Biologie & Ökologie",
              "Neurologie": "Mensch & Gesellschaft",
              "Psychologie": "Mensch & Gesellschaft",
              "Medizingeschichte": "Mensch & Gesellschaft",
              "Anthropologie": "Mensch & Gesellschaft",
              "Linguistik": "Mensch & Gesellschaft",
              "Soziologie": "Mensch & Gesellschaft",
              "Verhaltensökonomie": "Mensch & Gesellschaft",
              "Spieltheorie": "Mensch & Gesellschaft",
              "Geschichte": "Geschichte & Kultur",
              "Archäologie": "Geschichte & Kultur",
              "Technologiegeschichte": "Geschichte & Kultur",
              "Klimaforschung": "Geschichte & Kultur",
          }

          day_of_year = date.today().timetuple().tm_yday
          today_kategorie = ROTATION[day_of_year % len(ROTATION)]
          today_hauptkategorie = HAUPTKATEGORIEN.get(today_kategorie, "")
          print(f"Heutige Kategorie (Tag {day_of_year}): {today_kategorie} [{today_hauptkategorie}]")

          # ── SAMMLUNG LADEN & DEDUPLIZIEREN ──────────────────────────
          sammlung = []
          previous_titles = []
          existing_in_category = []

          if os.path.exists('sammlung.json'):
              try:
                  with open('sammlung.json', 'r', encoding='utf-8') as f:
                      sammlung = json.load(f)
                  previous_titles = [e.get('titel', '') for e in sammlung if e.get('titel')]
                  # Alle bisherigen Stauner-Texte in dieser Kategorie für Deduplizierung
                  for e in sammlung:
                      if e.get('kategorie') == today_kategorie:
                          existing_in_category.append(
                              f"- {e.get('titel', '')}: {e.get('stauner', '')[:120]}"
                          )
              except Exception as e:
                  print(f"Sammlung konnte nicht geladen werden: {e}")

          # Duplicate guard — verhindert doppelte Ausführung am selben Tag
          if sammlung and sammlung[-1].get('datum') == today:
              print(f"Story für heute ({today}) bereits vorhanden — abgebrochen.")
              exit(0)

          print(f"Beiträge gesamt: {len(sammlung)}")
          print(f"Bereits in '{today_kategorie}': {len(existing_in_category)}")

          titles_str = '\n'.join(f"- {t}" for t in previous_titles[-80:]) if previous_titles else "keine"
          existing_str = '\n'.join(existing_in_category) if existing_in_category else "keine"

          # ── PROMPT ──────────────────────────────────────────────────
          prompt = (
              f"Du bist Chefredakteur von 'Der tägliche Stauner' im Geist von "
              f"'Im Grunde Gut' (Rutger Bregman) und 'Factfulness' (Hans Rosling). "
              f"Heute ist der {today}.\n\n"
              f"HEUTIGE KATEGORIE (Pflicht, nicht ändern): {today_kategorie}\n"
              f"HAUPTKATEGORIE: {today_hauptkategorie}\n\n"
              f"BEREITS VORHANDENE TITEL — diese Themen nicht wiederholen:\n{titles_str}\n\n"
              f"BEREITS IN '{today_kategorie}' BEHANDELT — inhaltlich deutlich unterscheiden:\n{existing_str}\n\n"
              f"Wähle ein SPEZIFISCHES, ÜBERRASCHENDES Phänomen aus '{today_kategorie}' "
              f"das sich klar von allen obigen Titeln und Inhalten unterscheidet.\n\n"
              f"Die Geschichte:\n"
              f"1. Beginnt mit einer konkreten, verbreiteten Fehlannahme\n"
              f"2. Zeigt mit präzisen, belegten Fakten was wirklich stimmt\n"
              f"3. Endet mit der überraschenden, positiven Bedeutung\n\n"
              f"Ton: sachlich, präzise, faszinierend, ermutigend. "
              f"Niemals Krieg, Katastrophen, politische Konflikte.\n\n"
              f"QUELLE: Nenne NUR was du mit Sicherheit kennst. ERFINDE NIEMALS einen Titel oder eine URL. "
              f"Format: 'Nachname et al. (Jahr): Titel. Zeitschrift.' "
              f"Wenn unsicher: nur Forschungsfeld und Institution, z.B. 'Verhaltensökonomie, Universität Chicago'. "
              f"quelle_url leer lassen wenn keine echte URL bekannt.\n\n"
              f"Bonusfakt unter 'Schon gewusst?': Ein überraschender Fakt aus '{today_kategorie}' "
              f"der NICHT in der Geschichte vorkommt.\n\n"
              f"Schreibe alle Felder ZWEIMAL: einmal auf Deutsch (Suffix _de) und einmal auf Englisch (Suffix _en). "
              f"Antworte NUR mit diesem JSON ohne Markdown:\n"
              '{{"kategorie":"{kat}",'
              '"hauptkategorie":"{hkat}",'
              '"titel_de":"...","titel_en":"...",'
              '"stauner_de":"...","stauner_en":"...",'
              '"absaetze_de":["...","...","..."],'
              '"absaetze_en":["...","...","..."],'
              '"schon_gewusst_de":"...","schon_gewusst_en":"...",'
              '"quelle":"Autor(en) (Jahr): Titel. Zeitschrift.",'
              '"quelle_url":""}}'
          ).replace('{kat}', today_kategorie).replace('{hkat}', today_hauptkategorie)

          payload = {
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 2000,
              "messages": [{"role": "user", "content": prompt}]
          }

          req = urllib.request.Request(
              'https://api.anthropic.com/v1/messages',
              data=json.dumps(payload).encode('utf-8'),
              headers={
                  'Content-Type': 'application/json',
                  'x-api-key': api_key,
                  'anthropic-version': '2023-06-01'
              },
              method='POST'
          )

          try:
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode('utf-8'))
          except urllib.error.HTTPError as e:
              print(f"API Fehler: {e.code} {e.read().decode('utf-8')}")
              exit(1)

          text = data['content'][0]['text'].strip()
          if text.startswith('```'):
              text = text.split('\n', 1)[1].rsplit('```', 1)[0].strip()

          story = json.loads(text)
          story['datum'] = today
          # Sicherstellen dass Kategorie korrekt ist
          story['kategorie'] = today_kategorie
          story['hauptkategorie'] = today_hauptkategorie
          # Backwards compatibility: map _de fields to base fields for existing code
          story['titel'] = story.get('titel_de', story.get('titel', ''))
          story['stauner'] = story.get('stauner_de', story.get('stauner', ''))
          story['absaetze'] = story.get('absaetze_de', story.get('absaetze', []))
          story['schon_gewusst'] = story.get('schon_gewusst_de', story.get('schon_gewusst', ''))

          print(f"Titel: {story.get('titel', '')}")
          print(f"Kategorie: {story.get('kategorie', '')} [{story.get('hauptkategorie', '')}]")
          print(f"Quelle: {story.get('quelle', '')}")
          print(f"URL: {story.get('quelle_url', '')}")

          # ── SPEICHERN ───────────────────────────────────────────────
          with open('story.json', 'w', encoding='utf-8') as f:
              json.dump(story, f, ensure_ascii=False, indent=2)

          sammlung.append(story)

          with open('sammlung.json', 'w', encoding='utf-8') as f:
              json.dump(sammlung, f, ensure_ascii=False, indent=2)

          print(f"Sammlung enthält jetzt {len(sammlung)} Beiträge")
          PYEOF

      - name: Dateien committen
        run: |
          git config user.name "Täglicher Stauner"
          git config user.email "actions@github.com"
          git add story.json sammlung.json
          git diff --staged --quiet || git commit -m "Stauner: $(date +%Y-%m-%d)"
          git push
